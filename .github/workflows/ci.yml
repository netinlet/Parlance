name: CI Build

on:
  push:
    branches:
      - main
      - development
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET Build and Test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      TEST_RESULTS_DIR: ${{ github.workspace }}/.ci/test-results

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            src/Parlance.Agent/Core/package-lock.json
            src/Parlance.Agent/Adapter.Claude/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Pack analyzers into local feed
        run: make local-feed

      - name: Restore dependencies
        run: make restore

      - name: Validate agent workspaces
        run: make agent-ci

      - name: Verify committed agent bundles are fresh
        run: make agent-dist-check

      - name: Verify code formatting
        run: make format

      - name: Build solution
        run: make build

      - name: Prepare test results directory
        run: make test-results-dir

      - name: Run tests
        run: make test

      - name: Generate coverage report
        if: success()
        run: |
          make coverage-report
          cat "${TEST_RESULTS_DIR}/CoverageReport/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: ignore
